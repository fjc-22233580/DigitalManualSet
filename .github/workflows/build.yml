name: Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore DigitalManualSet.slnx

      - name: Build
        run: dotnet build DigitalManualSet.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test DigitalManualSet.slnx --configuration Release --no-build

      - name: Publish WPF app
        run: dotnet publish src/DigitalManualSet.App/DigitalManualSet.App.csproj --configuration Release --no-build --output output/publish

      - name: Set artifact name
        shell: pwsh
        run: |
          $year = Get-Date -Format 'yyyy'
          $dayNumber = (Get-Date).DayOfYear
          $buildNumber = $env:GITHUB_RUN_NUMBER
          echo "ARTIFACT_NAME=DigitalManualSet-$year-$dayNumber-$buildNumber" >> $env:GITHUB_ENV

      - name: Upload published app
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: output/publish